name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  # ─── Test Jobs ───────────────────────────────────────────────────────

  go-test:
    name: Go (test + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: go/coverage.out

  dotnet-test:
    name: .NET ${{ matrix.dotnet }} (test + coverage)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.0.x', '10.0.x']
    defaults:
      run:
        working-directory: dotnet
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - run: dotnet restore OtelHelper.Tests/OtelHelper.Tests.csproj
      - run: >
          dotnet test OtelHelper.Tests
          --configuration Release
          --no-restore
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          /p:Threshold=90
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:Exclude="[xunit*]*"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-coverage-${{ matrix.dotnet }}
          path: dotnet/OtelHelper.Tests/coverage/

  python-test:
    name: Python (test + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]" grpcio -q
      - run: >
          pytest tests/ --ignore=tests/test_propagation.py -v
          --cov=otel_helper
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=90
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: python/coverage.xml

  # ─── Build Jobs ──────────────────────────────────────────────────────

  build-lib:
    name: Build packages (once)
    runs-on: ubuntu-latest
    needs: [go-test, dotnet-test, python-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: dotnet pack dotnet/OtelHelper/OtelHelper.csproj -c Release -o packages
      - run: pip install build -q && python -m build --outdir packages python
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/
          retention-days: 1

  example-images:
    name: Build example images (consume prebuilt package)
    runs-on: ubuntu-latest
    needs: [build-lib]
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: dotnet
            dockerfile: dotnet/example/dotnet-api/Dockerfile.demo
          - context: dotnet
            dockerfile: dotnet/example/dotnet-backend/Dockerfile.demo
          - context: dotnet
            dockerfile: dotnet/example/dotnet-process/Dockerfile.demo
          - context: python
            dockerfile: python/example/python-api/Dockerfile.demo
          - context: python
            dockerfile: python/example/python-backend/Dockerfile.demo
          - context: python
            dockerfile: python/example/python-process/Dockerfile.demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: ${{ matrix.context }}/packages
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Publish Jobs ───────────────────────────────────────────────────

  publish-dotnet:
    name: Publish .NET to GitHub NuGet
    runs-on: ubuntu-latest
    needs: [dotnet-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Pack with dev version
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          dotnet pack OtelHelper/OtelHelper.csproj \
            -c Release \
            -o nupkgs \
            /p:Version="0.1.0-dev-${SHORT_SHA}" \
            /p:RepositoryUrl="https://github.com/StaffOps/staffops-otel-libs"
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/StaffOps/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  publish-dotnet-release:
    name: Publish .NET release to GitHub NuGet
    runs-on: ubuntu-latest
    needs: [dotnet-test]
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Pack release version
        run: |
          dotnet pack OtelHelper/OtelHelper.csproj \
            -c Release \
            -o nupkgs \
            /p:Version="${{ steps.version.outputs.VERSION }}" \
            /p:RepositoryUrl="https://github.com/StaffOps/staffops-otel-libs"
      - name: Push to GitHub Packages
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/StaffOps/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  publish-python-release:
    name: Publish Python to GitHub Release
    runs-on: ubuntu-latest
    needs: [python-test]
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheel and sdist
        run: pip install build -q && python -m build
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist/* --clobber \
            || gh release create "${{ github.ref_name }}" dist/* --generate-notes
